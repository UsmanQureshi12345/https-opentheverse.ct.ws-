<div className="text-center max-w-2xl mx-auto mb-12"><p className="rv text-sm font-semibold text-accent-600 uppercase tracking-wider mb-2">{d.team.preheading}</p><h2 className="rv rd1 font-display text-[clamp(1.75rem,4vw,2.75rem)] font-bold text-navy-800 leading-tight">{d.team.heading}</h2></div>
<div className="grid grid-cols-[repeat(auto-fit,minmax(220px,1fr))] gap-6">
{d.team.members.map((m,i)=><div key={i} className={`rv rd${Math.min((i%6)+1,6)} group bg-white rounded-2xl overflow-hidden shadow-md border border-surface-200 clift`}>
<div className="relative overflow-hidden"><img src={m.image} alt={m.name} className="w-full aspect-[4/5] object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy"/><div className="absolute inset-0 bg-gradient-to-t from-navy-800/50 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"/></div>
<div className="p-4 text-center"><h3 className="font-bold text-navy-800 text-sm leading-snug">{m.name}</h3><p className="text-xs text-gray-400 mt-1">{m.role}</p></div></div>)}
</div></div>
</div></section>

{/* Stats */}
<section className="py-16 lg:py-20 bg-gradient-to-br from-navy-800 via-navy-700 to-navy-800 relative overflow-hidden">
<div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage:'radial-gradient(circle at 1px 1px, white 1px, transparent 0)',backgroundSize:'30px 30px'}}/>
<div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
<div className="grid grid-cols-[repeat(auto-fit,minmax(180px,1fr))] gap-4 lg:gap-5">
{d.stats.map((s,i)=><div key={i} className={`rv rd${Math.min(i+1,6)} rounded-2xl p-6 text-center ${s.profile?'bg-white/10 backdrop-blur-sm border border-white/12':'bg-white/5 border border-white/8'}`}>
{s.profile&&<div className="flex justify-center mb-3"><img src={s.profile.image} alt={s.profile.name} className="w-14 h-14 rounded-full object-cover ring-2 ring-accent-400/40" loading="lazy"/></div>}
<div className="sv text-3xl lg:text-4xl text-white mb-1.5">{s.value}</div>
<p className="text-sm text-white/55 leading-snug">{s.label}</p>
</div>)}
</div></div></section>
</div>)}

/* ══════════ SERVICES PAGE ══════════ */
function ServicesPage({d}){
return(<div>
<PageHero title="Our Services" subtitle="Comprehensive digital marketing solutions tailored to accelerate your business growth."/>
<section className="py-16 lg:py-24 bg-surface-50">
<div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div className="text-center max-w-2xl mx-auto mb-12"><p className="rv text-sm font-semibold text-accent-600 uppercase tracking-wider mb-2">{d.services.preheading}</p><h2 className="rv rd1 font-display text-[clamp(1.75rem,4vw,2.75rem)] font-bold text-navy-800 leading-tight">{d.services.heading}</h2></div>

{/* Full Services Grid */}
<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-20">
{d.services.items.map((s,i)=><div key={i} className={`rv rd${Math.min((i%6)+1,6)} group bg-white rounded-2xl overflow-hidden shadow-md border border-surface-200 clift`}>
<div className="relative overflow-hidden"><img src={s.image} alt={s.title} className="w-full aspect-[3/2] object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy"/><div className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm text-navy-700 w-10 h-10 rounded-xl flex items-center justify-center shadow-sm"><I n={s.icon} s={20}/></div></div>
<div className="p-6"><h3 className="text-lg font-bold text-navy-800 mb-2">{s.title}</h3><p className="text-sm text-gray-500 leading-relaxed">{s.description}</p></div></div>)}
</div>

{/* Process */}
<div className="mb-20">
<div className="text-center mb-12"><h2 className="rv font-display text-[clamp(1.75rem,4vw,2.5rem)] font-bold text-navy-800 leading-tight">How We Work</h2></div>
<div className="grid grid-cols-1 md:grid-cols-3 gap-6">
{d.services.process.map((p,i)=><div key={i} className={`rv rd${Math.min(i+1,6)} relative bg-white rounded-2xl p-8 shadow-md border border-surface-200 clift`}>
<div className="sv text-5xl gtxt mb-4">{p.step}</div>
<h3 className="text-lg font-bold text-navy-800 mb-3">{p.title}</h3>
<p className="text-sm text-gray-500 leading-relaxed">{p.description}</p>
{i<2&&<div className="hidden md:block absolute top-1/2 -right-3 w-6 h-6 text-surface-300"><I n="chevronR" s={24}/></div>}
</div>)}
</div></div>

{/* Features */}
<div className="grid grid-cols-[repeat(auto-fit,minmax(260px,1fr))] gap-6">
{d.services.features.map((f,i)=><div key={i} className={`rv rd${Math.min(i+1,6)} bg-white rounded-2xl p-6 lg:p-8 shadow-md border border-surface-200 clift`}>
<div className="w-12 h-12 rounded-xl bg-accent-50 flex items-center justify-center mb-4"><I n={f.icon} s={24} c="text-accent-600"/></div>
<h3 className="text-lg font-bold text-navy-800 mb-2">{f.title}</h3>
<p className="text-sm text-gray-500 leading-relaxed">{f.description}</p></div>)}
</div>
</div></section>

{/* CTA */}
<section className="py-16 lg:py-20 bg-gradient-to-r from-navy-700 via-navy-600 to-navy-700 relative overflow-hidden">
<div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage:'radial-gradient(circle at 2px 2px, white 1px, transparent 0)',backgroundSize:'24px 24px'}}/>
<div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
<h2 className="rv font-display text-[clamp(1.5rem,3.5vw,2.5rem)] font-bold text-white leading-tight mb-4">Let's Discuss Your Project</h2>
<p className="rv rd1 text-white/65 mb-8">Every business is unique. Let us create a custom strategy that fits your goals and budget perfectly.</p>
<a href="#contact" className="rv rd2 inline-flex items-center gap-2 bg-gradient-to-r from-accent-500 to-accent-600 text-white font-bold px-8 py-4 rounded-xl hover:from-accent-600 hover:to-accent-700 transition-all shadow-xl hover:-translate-y-0.5">Get a Free Consultation<I n="arrowR" s={18}/></a>
</div></section>
</div>)}

/* ══════════ CONTACT PAGE ══════════ */
function ContactPage({d}){
const[f,sf]=useState({name:'',email:'',subject:'',message:''});
const[errors,se]=useState({});
const[sent,ss]=useState(false);
const[loading,sl]=useState(false);

const validate=()=>{const e={};if(!f.name.trim())e.name="Name is required";if(!f.email.trim())e.email="Email is required";else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email))e.email="Invalid email address";if(!f.subject.trim())e.subject="Subject is required";if(!f.message.trim())e.message="Message is required";return e};

const handleSubmit=e=>{e.preventDefault();const v=validate();if(Object.keys(v).length){se(v);return}se({});sl(true);setTimeout(()=>{sl(false);ss(true);sf({name:'',email:'',subject:'',message:''});setTimeout(()=>ss(false),5000)},1200)};

const handleChange=(field,val)=>{sf(p=>({...p,[field]:val}));if(errors[field])se(p=>{const n={...p};delete n[field];return n})};

const inpCls=(field)=>`w-full px-4 py-3 rounded-xl border ${errors[field]?'border-red-400 bg-red-50/50':'border-surface-300 bg-white'} text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent-500/30 focus:border-accent-500 transition-all`;

return(<div>
<PageHero title="Get In Touch" subtitle="We'd love to hear from you. Reach out and let's start building something great together."/>
<section className="py-16 lg:py-24 bg-surface-50">
<div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div className="grid grid-cols-1 lg:grid-cols-5 gap-10 lg:gap-16">
{/* Form */}
<div className="lg:col-span-3">
<div className="rv bg-white rounded-3xl p-8 lg:p-10 shadow-lg border border-surface-200">
<h2 className="text-xl font-bold text-navy-800 mb-6">Send Us a Message</h2>
{sent&&<div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl flex items-center gap-3"><I n="check" s={20} c="text-green-600" sw={3}/><span className="text-sm font-semibold text-green-700">Message sent successfully! We'll get back to you soon.</span></div>}
<form onSubmit={handleSubmit} noValidate className="space-y-5">
<div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
<div><label className="block text-sm font-semibold text-navy-700 mb-1.5" htmlFor="name">Full Name</label><input id="name" type="text" value={f.name} onChange={e=>handleChange('name',e.target.value)} className={inpCls('name')} placeholder="John Doe"/> {errors.name&&<p className="mt-1 text-xs text-red-500">{errors.name}</p>}</div>
<div><label className="block text-sm font-semibold text-navy-700 mb-1.5" htmlFor="email">Email Address</label><input id="email" type="email" value={f.email} onChange={e=>handleChange('email',e.target.value)} className={inpCls('email')} placeholder="john@example.com"/> {errors.email&&<p className="mt-1 text-xs text-red-500">{errors.email}</p>}</div>
</div>
<div><label className="block text-sm font-semibold text-navy-700 mb-1.5" htmlFor="subject">Subject</label><input id="subject" type="text" value={f.subject} onChange={e=>handleChange('subject',e.target.value)} className={inpCls('subject')} placeholder="How can we help?"/> {errors.subject&&<p className="mt-1 text-xs text-red-500">{errors.subject}</p>}</div>
<div><label className="block text-sm font-semibold text-navy-700 mb-1.5" htmlFor="message">Message</label><textarea id="message" rows={5} value={f.message} onChange={e=>handleChange('message',e.target.value)} className={`${inpCls('message')} resize-none`} placeholder="Tell us about your project..."/> {errors.message&&<p className="mt-1 text-xs text-red-500">{errors.message}</p>}</div>
<button type="submit" disabled={loading} className="w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-gradient-to-r from-accent-500 to-accent-600 text-white font-semibold px-8 py-3.5 rounded-xl hover:from-accent-600 hover:to-accent-700 transition-all shadow-lg shadow-accent-500/20 disabled:opacity-70 disabled:cursor-not-allowed">
{loading?'Sending...':'Send Message'} {!loading&&<I n="send" s={16}/>}
</button>
</form></div></div>

{/* Contact Info */}
<div className="lg:col-span-2 space-y-6">
<div className="rv bg-white rounded-2xl p-6 shadow-md border border-surface-200 clift">
<div className="flex items-start gap-4"><div className="w-12 h-12 rounded-xl bg-accent-50 flex items-center justify-center flex-shrink-0"><I n="mail" s={22} c="text-accent-600"/></div><div><h3 className="font-bold text-navy-800 mb-1">Email Us</h3><a href={`mailto:${d.footer.contact.email}`} className="text-sm text-gray-500 hover:text-accent-600 transition-colors break-all">{d.footer.contact.email}</a></div></div></div>
<div className="rv rd1 bg-white rounded-2xl p-6 shadow-md border border-surface-200 clift">
<div className="flex items-start gap-4"><div className="w-12 h-12 rounded-xl bg-accent-50 flex items-center justify-center flex-shrink-0"><I n="phone" s={22} c="text-accent-600"/></div><div><h3 className="font-bold text-navy-800 mb-1">Call Us</h3><a href={`tel:${d.footer.contact.phone.replace(/\s/g,'')}`} className="text-sm text-gray-500 hover:text-accent-600 transition-colors">{d.footer.contact.phone}</a></div></div></div>
<div className="rv rd2 bg-white rounded-2xl p-6 shadow-md border border-surface-200 clift">
<div className="flex items-start gap-4"><div className="w-12 h-12 rounded-xl bg-accent-50 flex items-center justify-center flex-shrink-0"><I n="mapPin" s={22} c="text-accent-600"/></div><div><h3 className="font-bold text-navy-800 mb-1">Visit Us</h3><p className="text-sm text-gray-500 leading-relaxed">{d.footer.contact.address}</p></div></div></div>
<div className="rv rd3 bg-white rounded-2xl p-6 shadow-md border border-surface-200 clift">
<div className="flex items-start gap-4"><div className="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center flex-shrink-0"><I n="whatsapp" s={22} c="text-green-600"/></div><div><h3 className="font-bold text-navy-800 mb-1">WhatsApp</h3><a href={d.footer.whatsapp.url} target="_blank" rel="noopener noreferrer" className="text-sm text-gray-500 hover:text-green-600 transition-colors">{d.footer.whatsapp.label}</a></div></div></div>
<div className="rv rd4 bg-white rounded-2xl p-6 shadow-md border border-surface-200">
<h3 className="font-bold text-navy-800 mb-4">Follow Us</h3>
<div className="flex items-center gap-3">{d.footer.social.map((s,i)=><a key={i} href={s.url} className="w-11 h-11 rounded-xl bg-surface-100 flex items-center justify-center hover:bg-navy-700 hover:text-white text-gray-500 transition-all" aria-label={s.name}><I n={{Facebook:"facebook",Linkedin:"linkedin",Instagram:"instagram"}[s.name]||"facebook"} s={18}/></a>)}</div>
</div>
</div>
</div></div></section>
</div>)}

/* ══════════ APP ══════════ */
function App(){
useReveal();
const page=useRouter();
const d=siteData;
const pages={home:<HomePage d={d}/>,about:<AboutPage d={d}/>,services:<ServicesPage d={d}/>,contact:<ContactPage d={d}/>};
return(<React.Fragment>
<AnnouncementBar data={d.announcement}/>
<Navbar data={d.navbar} page={page}/>
<main>{pages[page]||pages.home}</main>
<Footer data={d.footer}/>
<WAFloat url={d.footer.whatsapp.url}/>
</React.Fragment>)}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
